# Cargo configuration for flagd-evaluator

# Disable SIMD for WASM target (Chicory doesn't support V128/SIMD128)
# Use "unsupported" getrandom backend: ahash pulls in getrandom 0.3 but the evaluator
# never calls it at runtime (murmurhash3 is deterministic). This avoids wasm-bindgen
# browser imports that break server-side runtimes (wasmtime, Chicory, wazero).
[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "target-feature=-simd128",
    "--cfg", "getrandom_backend=\"unsupported\""
]
