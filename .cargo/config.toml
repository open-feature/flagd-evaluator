# Cargo configuration for flagd-evaluator

# Disable SIMD for WASM target (Chicory doesn't support V128/SIMD128)
# Use "unsupported" getrandom backend: nothing in our evaluation path calls getrandom
# at runtime (ahash uses compile-time-rng, murmurhash3 is deterministic).
# This avoids pulling in wasm-bindgen entirely.
[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "target-feature=-simd128",
    "--cfg", "getrandom_backend=\"unsupported\""
]
